<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>直播数据</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6C5CE7;
      /* 活力紫 */
      --accent: #FF6B81;
      /* 珊瑚粉 */
      --gold: #F9A825;
      /* 暖金 */
      --gold-dark: #F57F17;
      --green: #00B894;
      /* 薄荷绿 */
      --blue: #0984E3;
      /* 晴空蓝 */
      --bg-white: #FFFFFF;
      --bg-soft: #F8F9FF;
      --card-white: #FFFFFF;
      --card-shadow: 0 12px 28px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0, 0, 0, 0.02);
      --text-dark: #1E272E;
      --text-muted: #5F6C7A;
      --border-light: #EDF2F7;
      --hover-lift: 0 20px 35px -12px rgba(108, 92, 231, 0.15);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(145deg, #F9FAFF 0%, #F1F4FE 100%);
      color: var(--text-dark);
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: 48px;
    }

    /* 柔和氛围光晕 (浅色系装饰) */
    .bg-decoration {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.35;
      animation: floatSoft 12s ease-in-out infinite;
    }

    .orb1 {
      top: -100px;
      left: -80px;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(108, 92, 231, 0.25), transparent 70%);
    }

    .orb2 {
      bottom: 10%;
      right: -60px;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(255, 107, 129, 0.2), transparent 70%);
      animation-delay: -5s;
    }

    .orb3 {
      top: 40%;
      left: 20%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(0, 184, 148, 0.12), transparent 70%);
      animation-delay: -2s;
    }

    @keyframes floatSoft {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(20px, 30px) scale(1.05);
      }
    }

    /* 主容器 */
    .container {
      position: relative;
      z-index: 2;
      max-width: 580px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* 头部区域 */
    .header {
      text-align: center;
      padding: 32px 20px 24px;
    }

    .badge-group {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(105deg, #FF8A5C, #FF4D6D);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 5px 16px;
      border-radius: 40px;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 12px rgba(255, 77, 109, 0.2);
    }

    .live-badge .dot {
      width: 7px;
      height: 7px;
      background: white;
      border-radius: 50%;
      animation: blink 1s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    .local-datetime {
      background: rgba(108, 92, 231, 0.08);
      backdrop-filter: blur(4px);
      padding: 5px 14px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 500;
      color: var(--primary);
      border: 0.5px solid rgba(108, 92, 231, 0.2);
    }

    .header p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* 主播卡片 白色靓丽 */
    .streamer-card {
      background: var(--card-white);
      border-radius: 32px;
      box-shadow: var(--card-shadow);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid rgba(108, 92, 231, 0.08);
    }

    .streamer-card:hover {
      box-shadow: var(--hover-lift);
      transform: translateY(-2px);
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 6px 14px rgba(108, 92, 231, 0.25);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .streamer-info h3 {
      font-size: 18px;
      font-weight: 800;
      color: var(--text-dark);
    }

    .room-id {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .stream-duration-badge {
      background: #F4F6FD;
      border-radius: 24px;
      padding: 8px 16px;
      text-align: center;
      min-width: 100px;
    }

    .stream-duration-badge .label {
      font-size: 10px;
      color: var(--text-muted);
    }

    .stream-duration-badge .time {
      font-size: 16px;
      font-weight: 800;
      background: linear-gradient(145deg, var(--green), var(--blue));
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-variant-numeric: tabular-nums;
    }

    /* 核心指标三列 */
    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .hero-stat {
      background: var(--card-white);
      border-radius: 26px;
      padding: 18px 8px;
      text-align: center;
      box-shadow: var(--card-shadow);
      transition: all 0.2s;
      border: 1px solid var(--border-light);
    }

    .hero-stat .icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .hero-stat .value {
      font-size: 24px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      margin-bottom: 4px;
    }

    .hero-stat .value.views {
      color: var(--blue);
    }

    .hero-stat .value.likes {
      color: var(--accent);
    }

    .hero-stat .value.subs {
      color: var(--green);
    }

    .hero-stat .label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* 通用卡片区 */
    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 28px 0 16px 0;
      font-size: 18px;
      font-weight: 700;
      color: var(--text-dark);
    }

    .section-title .emoji {
      font-size: 22px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 8px;
    }

    .detail-card {
      background: var(--card-white);
      border-radius: 24px;
      padding: 18px 16px;
      box-shadow: var(--card-shadow);
      transition: all 0.2s;
      border: 1px solid var(--border-light);
    }

    .detail-card:active {
      transform: scale(0.98);
    }

    .dc-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .dc-icon {
      width: 38px;
      height: 38px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .dc-icon.purple {
      background: #EEF2FF;
      color: var(--primary);
    }

    .dc-icon.pink {
      background: #FFF0F3;
      color: var(--accent);
    }

    .dc-icon.gold {
      background: #FFF7E5;
      color: var(--gold);
    }

    .dc-icon.green {
      background: #E0F9F2;
      color: var(--green);
    }

    .dc-icon.blue {
      background: #E6F2FF;
      color: var(--blue);
    }

    .dc-icon.orange {
      background: #FFF0E7;
      color: #FF8C42;
    }

    .dc-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .dc-value {
      font-size: 26px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      margin-bottom: 6px;
      color: var(--text-dark);
    }

    .dc-change {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 30px;
      font-weight: 600;
    }

    .dc-change.up {
      background: #E0F9F0;
      color: #00875A;
    }

    .dc-change.down {
      background: #FFEFEF;
      color: #E74C3C;
    }

    /* 收益中心卡片 */
    .gold-exchange {
      background: linear-gradient(115deg, #FFFFFF, #FFFCF5);
      border-radius: 32px;
      padding: 22px 20px;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(249, 168, 37, 0.2);
      margin-bottom: 20px;
    }

    .gold-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .gold-header h3 {
      font-size: 17px;
      font-weight: 700;
      display: flex;
      gap: 8px;
    }

    .gold-rate {
      background: #FFF2DC;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--gold-dark);
    }

    .gold-amounts {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .gold-item {
      flex: 1;
    }

    .gi-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .gi-value {
      font-size: 30px;
      font-weight: 800;
    }

    .gi-value.coins {
      color: var(--gold-dark);
    }

    .gi-value.dollars {
      color: var(--green);
    }

    .gold-arrow {
      font-size: 28px;
      color: var(--text-muted);
      opacity: 0.6;
    }

    .exchange-bar {
      height: 8px;
      background: #EDF2F7;
      border-radius: 12px;
      overflow: hidden;
      margin: 16px 0 8px;
    }

    .exchange-bar .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold), #F57C00);
      border-radius: 12px;
      transition: width 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .exchange-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 18px;
    }

    .withdraw-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(105deg, var(--gold), var(--gold-dark));
      border: none;
      border-radius: 28px;
      font-size: 15px;
      font-weight: 700;
      color: #1E2A2E;
      box-shadow: 0 6px 14px rgba(249, 168, 37, 0.3);
      cursor: pointer;
      transition: all 0.2s;
    }

    .withdraw-btn:active {
      transform: scale(0.97);
    }

    /* 图表卡片 */
    .chart-card {
      background: var(--card-white);
      border-radius: 32px;
      padding: 20px;
      box-shadow: var(--card-shadow);
      margin-bottom: 20px;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .chart-header h3 {
      font-size: 16px;
      font-weight: 700;
    }

    .chart-legend {
      display: flex;
      gap: 14px;
      font-size: 11px;
    }

    .chart-legend .dot {
      width: 9px;
      height: 9px;
      border-radius: 9px;
      display: inline-block;
      margin-right: 4px;
    }

    .dot.viewers {
      background: var(--primary);
    }

    .dot.peak {
      background: var(--accent);
    }

    .chart-area {
      height: 180px;
      width: 100%;
      margin-top: 8px;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* 热词云 */
    .tags-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
    }

    .tag {
      background: #F4F6FC;
      padding: 6px 18px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      color: #2C3E50;
      transition: all 0.2s;
      border: 0.5px solid rgba(0, 0, 0, 0.03);
    }

    .tag.hot {
      background: #FFEDF0;
      color: #E8436E;
      font-weight: 600;
    }

    .tag:active {
      transform: scale(0.94);
    }

    /* 礼物榜 */
    .gift-rank {
      margin-bottom: 28px;
    }

    .gift-item {
      background: var(--card-white);
      border-radius: 20px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02), 0 1px 0 var(--border-light);
      transition: all 0.2s;
    }

    .gift-rank-num {
      width: 32px;
      height: 32px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 14px;
    }

    .gift-rank-num.r1 {
      background: linear-gradient(145deg, #FFD966, #FFB347);
      color: #2D1B00;
    }

    .gift-rank-num.r2 {
      background: linear-gradient(145deg, #E0E0E0, #B0B0B0);
      color: #1F1F1F;
    }

    .gift-rank-num.r3 {
      background: linear-gradient(145deg, #E4B88A, #C57F4A);
      color: white;
    }

    .gift-rank-num.rn {
      background: #F1F3F8;
      color: #6C7A89;
    }

    .gift-avatar {
      width: 44px;
      height: 44px;
      border-radius: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      background: linear-gradient(135deg, #F0F3FF, #FFF0F5);
    }

    .gift-info .name {
      font-weight: 700;
      font-size: 15px;
    }

    .gift-info .gift-name {
      font-size: 11px;
      color: var(--text-muted);
    }

    .gift-amount {
      text-align: right;
      margin-left: auto;
    }

    .gift-amount .coins {
      font-size: 16px;
      font-weight: 800;
      color: var(--gold-dark);
    }

    .gift-amount .usd {
      font-size: 10px;
      color: var(--text-muted);
    }

    .cta-section {
      margin-top: 20px;
      text-align: center;
    }

    .cta-section p {
      font-size: 14px;
      font-weight: 500;
      background: #EFF3FF;
      display: inline-block;
      padding: 8px 20px;
      border-radius: 40px;
      margin-bottom: 20px;
    }

    .cta-buttons {
      display: flex;
      gap: 12px;
    }

    .cta-btn {
      flex: 1;
      padding: 14px 0;
      border-radius: 40px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .cta-btn.primary {
      background: linear-gradient(105deg, var(--primary), #8F7BFF);
      color: white;
      box-shadow: 0 6px 12px rgba(108, 92, 231, 0.25);
    }

    .cta-btn.secondary {
      background: white;
      border: 1px solid #E2E8F0;
      color: var(--text-dark);
    }

    .cta-btn:active {
      transform: scale(0.96);
    }

    /* 分享弹层 */
    .share-modal {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: white;
      border-radius: 32px 32px 0 0;
      padding: 24px 20px 32px;
      z-index: 100;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.08);
    }

    .share-modal.active {
      transform: translateY(0);
    }

    .share-modal h3 {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .share-icons {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin-bottom: 28px;
    }

    .share-icon {
      width: 64px;
      align-items: center;
      text-align: center;
      font-size: 28px;
      cursor: pointer;
    }

    .share-icon span {
      font-size: 10px;
      display: block;
      color: var(--text-muted);
    }

    .share-close {
      width: 100%;
      background: #F4F6FA;
      border: none;
      padding: 14px;
      border-radius: 40px;
      font-weight: 600;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: 0.2s;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 60;
    }

    @keyframes confettiFall {
      0% {
        opacity: 1;
        top: -10px;
        transform: rotate(0deg);
      }

      100% {
        opacity: 0;
        top: 100vh;
        transform: rotate(720deg);
      }
    }
  </style>
</head>

<body>
  <div class="bg-decoration">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>
  <div class="confetti-container" id="confettiContainer"></div>
  <div class="container">
    <div class="header">
      <div class="badge-group">
        <div class="live-badge"><span class="dot"></span> 直播已结束</div>
        <div class="local-datetime" id="liveLocalTime">⏱️ 加载中...</div>
      </div>
      <!-- 原h1标题已删除 -->
      <p id="streamTime"></p>
    </div>

    <div class="streamer-card">
      <div class="avatar" id="avatarContainer">
        <img id="avatarImg" alt="主播头像">
      </div>
      <div class="streamer-info">
        <h3 id="streamerName"></h3>
        <div class="room-id" id="roomId"></div>
      </div>
      <div class="stream-duration-badge">
        <div class="label">直播时长</div>
        <div class="time" id="streamDuration"></div>
      </div>
    </div>

    <div class="hero-stats">
      <div class="hero-stat">
        <div class="icon">👁️</div>
        <div class="value views" id="counterViews" data-target="0">0</div>
        <div class="label">观看人次</div>
      </div>
      <div class="hero-stat">
        <div class="icon">❤️</div>
        <div class="value likes" id="counterLikes" data-target="0">0</div>
        <div class="label">点赞数</div>
      </div>
      <div class="hero-stat">
        <div class="icon">🔔</div>
        <div class="value subs" id="counterSubs" data-target="0">0</div>
        <div class="label">新增订阅</div>
      </div>
    </div>

    <div class="section-title"><span class="emoji">📈</span> 详细数据</div>
    <div class="detail-grid" id="detailGrid"></div>

    <div class="section-title"><span class="emoji">💰</span> 收益中心</div>
    <div class="gold-exchange">
      <div class="gold-header">
        <h3>金币收益</h3>
        <div class="gold-rate" id="goldRate"></div>
      </div>
      <div class="gold-amounts">
        <div class="gold-item">
          <div class="gi-label">获得金币</div>
          <div class="gi-value coins" id="counterGold" data-target="0">0</div>
        </div>
        <div class="gold-arrow">→</div>
        <div class="gold-item">
          <div class="gi-label">可兑换</div>
          <div class="gi-value dollars">$<span id="counterUsd" data-target="0" data-decimal="true">0.00</span></div>
        </div>
      </div>
      <div class="exchange-bar">
        <div class="fill" id="exchangeFill"></div>
      </div>
      <div class="exchange-label"><span>本月已提现: <b id="withdrawnTotal"></b></span><span>目标: $500.00</span></div>
      <button class="withdraw-btn" onclick="handleWithdraw()">💳 立即提现到钱包</button>
    </div>

    <div class="section-title"><span class="emoji">📊</span> 实时趋势</div>
    <div class="chart-card">
      <div class="chart-header">
        <h3>在线观众走势</h3>
        <div class="chart-legend"><span><span class="dot viewers"></span>实时在线</span><span><span
              class="dot peak"></span>峰值</span></div>
      </div>
      <div class="chart-area"><canvas id="trendChart"></canvas></div>
    </div>

    <div class="section-title"><span class="emoji">🔥</span> 弹幕热词</div>
    <div class="tags-cloud" id="tagsCloud"></div>

    <div class="section-title"><span class="emoji">🏅</span> 礼物排行榜 TOP 5</div>
    <div class="gift-rank" id="giftRank"></div>

    <div class="cta-section">
      <p>本次直播超越了 <b id="surpassedVal" style="color:var(--green)">89%</b> 的同分区主播 🎉</p>
      <div class="cta-buttons">
        <button class="cta-btn primary" onclick="openShare()">📤 分享战报</button>
        <button class="cta-btn secondary" onclick="startNewStream()">🎬 再来一场</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay" onclick="closeShare()"></div>
  <div class="share-modal" id="shareModal">
    <h3>📤 分享本场直播战报</h3>
    <div class="share-icons">
      <div class="share-icon" onclick="shareAction('微信')">💬<br><span>微信</span></div>
      <div class="share-icon" onclick="shareAction('微博')">📢<br><span>微博</span></div>
      <div class="share-icon" onclick="shareAction('Twitter')">🐦<br><span>Twitter</span></div>
      <div class="share-icon" onclick="shareAction('链接')">🔗<br><span>复制链接</span></div>
    </div>
    <button class="share-close" onclick="closeShare()">取消</button>
  </div>

  <script>
    // ========== 工具函数 ==========
    const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const randFloat = (min, max, dec = 2) => parseFloat((Math.random() * (max - min) + min).toFixed(dec));
    const formatNum = n => n.toLocaleString('en-US');
    const pick = arr => arr[Math.floor(Math.random() * arr.length)];
    const pad = n => n.toString().padStart(2, '0');

    // ========== 随机头像 (image/1.jpg ~ 13.jpg) ==========
    function setRandomAvatar() {
      const randomNum = rand(1, 13);   // 随机 1~13，对应 image/1.jpg 至 image/13.jpg
      const avatarPath = `image/${randomNum}.jpg`; // 注意文件夹名称为 image，若实际为 imgae 请自行修改
      const imgElement = document.getElementById('avatarImg');
      if (imgElement) {
        imgElement.src = avatarPath;
        imgElement.alt = `主播头像 ${randomNum}`;
        imgElement.onerror = function () {
          this.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ccircle fill="%236C5CE7" cx="50" cy="50" r="50"/%3E%3Ctext x="50" y="67" font-size="50" text-anchor="middle" fill="white"%3E🎤%3C/text%3E%3C/svg%3E';
        };
      }
    }

    // ========== 数据池 ==========
    // 主播名称列表（可随意增删修改）
    const streamerNames = ['韩丹丹', '甜心教主 ', '小野猫 ', '困困鱼 💄', '𝘚𝘪𝘭𝘺.', '布丁奶油卷', '小鱼吖✨', '〰️兜兜'];
    // 房间分区列表
    const rooms = ['颜值', '聊天', '颜值', '聊天', '聊天', '颜值'];
    // 礼物库：名称 + 单价金币
    const gifts = [
      { name: '宇宙之心', coin: 1000 }, { name: '星际飞船', coin: 500 }, { name: '梦幻城堡', coin: 300 },
      { name: '极光之翼', coin: 200 }, { name: '浪漫花束', coin: 100 }, { name: '火箭发射', coin: 150 },
      { name: '超级跑车', coin: 800 }, { name: '钻石王冠', coin: 600 }
    ];
    // 送礼用户昵称池 时间路人

    const userNames = ['孤风', '时间路人', '北遇', '四叶幸运草', '海豚音', '追风少年', '月亮不睡', '星辰大海', '清风徐来', '夏日微风', '冬日暖阳', '厚德载物', '一蓑烟雨', '往事随风', '死于话太多', '青春奋斗', '霸气de小男生', '戒情不戒烟.'];
    // 弹幕热词池
    const tags = ['🔥 太棒了', '666', '❤️ 好喜欢', '哈哈哈', '主播加油', '🎁 送火箭', '晚安~', '关注了', '😍 好美', '再来一个', '绝绝子', 'YYDS', '牛逼', '好听', '泪目了', '下次一定', '前排打卡', '沙发', '老板大气', '主播真美', '妈妈', '沦陷了', '结婚了吗?', 'hello', 'beautiful', 'angel'];

    // ========== 随机直播数据生成（所有数值范围均可在此处调整） ==========
    function generateSessionData() {
      // 【观看人次】范围 5000 ~ 520000，可根据需要修改 min/max
      const views = rand(5000, 72000);

      // 【点赞数】范围 = 观看人次的 28% ~ 68% (即点赞率区间)
      const likes = rand(Math.floor(views * 0.28), Math.floor(views * 0.11));

      // 【新增订阅】范围 500 ~ 15000
      const subs = rand(58, 666);

      // 【直播时长】小时 1~6 小时，分钟 0~59
      const durH = rand(1, 6);
      const durM = rand(0, 59);

      // 【平均停留时长】分钟 9~42 分钟
      const avgWatch = rand(9, 42);

      // 【最高在线人数】范围 = 观看人次的 4% ~ 14%，且上限不超过 42000
      const peak = rand(100, 620);

      // 【弹幕互动量】范围 500 ~ 18500
      const comments = rand(500, 18500);

      // 【分享次数】范围 150 ~ 11000
      const shares = rand(150, 600);

      // 【送礼人数】范围 350 ~ 5200
      const giftSenders = rand(150, 600);

      // 【粉丝牌新增】范围 180 ~ 3200
      const fanBadges = rand(68, 999);

      // 【获得金币】范围 35000 ~ 112000 金币
      const gold = rand(5900, 31200);

      // 【可兑换美元】 = 金币 / 1000 (汇率固定 1000🪙 = $1.00)
      const usd = (gold / 100).toFixed(2);

      // 【超越同分区百分比】范围 68% ~ 98%
      const surpassed = rand(68, 98);

      // 汇率文案（可修改）
      const rate = "100 = $1.00";

      // 【本月已提现】范围 850~2700 美元 + 随机小数
      const withdrawn = (rand(850, 2700) + randFloat(0, 0.99)).toFixed(2);

      // 直播时间计算（基于当前时间向前推 durH小时 durM分钟）
      const now = new Date();
      const startH = now.getHours() - durH - (now.getMinutes() < durM ? 1 : 0);
      const startM = now.getMinutes() - durM + (now.getMinutes() < durM ? 60 : 0);
      const dateStr = now.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
      const timeStr = `${pad(startH)}:${pad(startM)} - ${pad(now.getHours())}:${pad(now.getMinutes())}`;

      return { views, likes, subs, durH, durM, avgWatch, peak, comments, shares, giftSenders, fanBadges, gold, usd, surpassed, rate, withdrawn, dateStr, timeStr };
    }

    // ========== 更新DOM ==========
    function applyDataToDOM(data) {
      document.getElementById('streamTime').textContent = `⏰ 直播时间: ${data.timeStr}`;
      document.getElementById('streamerName').textContent = pick(streamerNames);
      document.getElementById('roomId').textContent = `房间号: #${rand(10000, 99999)} · ${pick(rooms)}`;
      document.getElementById('streamDuration').textContent = `${data.durH}h ${pad(data.durM)}m`;

      setCounter('counterViews', data.views);
      setCounter('counterLikes', data.likes);
      setCounter('counterSubs', data.subs);
      setCounter('counterGold', data.gold);
      setCounterUsd('counterUsd', parseFloat(data.usd));

      // 详细数据卡片（各项指标对比百分比随机波动）
      const details = [
        { icon: '⏱️', color: 'purple', label: '平均停留时长', value: `${data.avgWatch}m` },
        { icon: '👥', color: 'pink', label: '最高在线', value: data.peak },
        { icon: '💬', color: 'green', label: '弹幕互动', value: data.comments },
        { icon: '🔄', color: 'blue', label: '分享次数', value: data.shares },
        { icon: '🎁', color: 'orange', label: '送礼人数', value: data.giftSenders },
        { icon: '🏆', color: 'gold', label: '粉丝牌新增', value: data.fanBadges }
      ];
      const grid = document.getElementById('detailGrid');
      grid.innerHTML = '';
      details.forEach((d, i) => {
        // 环比变化百分比：随机 -18% ~ +44%
        const pct = randFloat(-18, 44);
        const isUp = pct > 0;
        grid.innerHTML += `
        <div class="detail-card" style="animation-delay:${i * 0.05}s">
          <div class="dc-header"><div class="dc-icon ${d.color}">${d.icon}</div><div class="dc-label">${d.label}</div></div>
          <div class="dc-value" data-target="${d.value}">${d.value}</div>
          <div class="dc-change ${isUp ? 'up' : 'down'}">${isUp ? '↑' : '↓'} ${Math.abs(pct).toFixed(1)}%</div>
        </div>`;
      });
      document.getElementById('goldRate').textContent = data.rate;
      document.getElementById('withdrawnTotal').textContent = `$${data.withdrawn}`;
      document.getElementById('surpassedVal').textContent = `${data.surpassed}%`;
    }

    function setCounter(id, val) { const el = document.getElementById(id); el.textContent = '0'; el.dataset.target = val; }
    function setCounterUsd(id, val) { const el = document.getElementById(id); el.textContent = '0.00'; el.dataset.target = val; }

    // ========== 图表绘制（随机生成模拟趋势） ==========
    function drawRandomChart(data) {
      const canvas = document.getElementById('trendChart');
      const rect = canvas.parentElement.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      const W = rect.width, H = rect.height;
      const padT = 28, padR = 16, padB = 28, padL = 16;
      const cW = W - padL - padR, cH = H - padT - padB;
      const points = 24;
      // 生成基础在线人数数据（大部分在峰值的40%以下波动）
      let baseData = Array.from({ length: points }, () => rand(600, data.peak * 0.4));
      const peakIdx = rand(8, 18);
      // 人为制造一个显著峰值
      baseData[peakIdx] = data.peak;
      baseData[peakIdx - 1] = Math.floor(data.peak * 0.82);
      baseData[peakIdx + 1] = Math.floor(data.peak * 0.88);
      const maxVal = Math.max(...baseData) * 1.08;
      ctx.clearRect(0, 0, W, H);
      // 网格线
      ctx.strokeStyle = '#E2E8F0';
      ctx.lineWidth = 0.8;
      for (let i = 0; i <= 4; i++) { const y = padT + (cH / 4) * i; ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke(); }
      // 渐变填充
      const grad = ctx.createLinearGradient(0, padT, 0, H - padB);
      grad.addColorStop(0, 'rgba(108,92,231,0.25)');
      grad.addColorStop(1, 'rgba(108,92,231,0.01)');
      ctx.beginPath();
      ctx.moveTo(padL, H - padB);
      baseData.forEach((v, i) => { const x = padL + (cW / (points - 1)) * i; const y = padT + cH - (v / maxVal) * cH; ctx.lineTo(x, y); });
      ctx.lineTo(W - padR, H - padB);
      ctx.fillStyle = grad; ctx.fill();
      // 折线
      ctx.beginPath();
      baseData.forEach((v, i) => { const x = padL + (cW / (points - 1)) * i; const y = padT + cH - (v / maxVal) * cH; if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); });
      ctx.strokeStyle = '#6C5CE7'; ctx.lineWidth = 2.8; ctx.stroke();
      // 峰值标记
      const px = padL + (cW / (points - 1)) * peakIdx; const py = padT + cH - (baseData[peakIdx] / maxVal) * cH;
      ctx.beginPath(); ctx.arc(px, py, 7, 0, Math.PI * 2); ctx.fillStyle = '#FF6B81'; ctx.fill();
      ctx.fillStyle = '#2D3436'; ctx.font = 'bold 10px "Inter"'; ctx.textAlign = 'center';
      ctx.fillText(`🔥 ${formatNum(baseData[peakIdx])}`, px, py - 12);
      // X轴时间标签
      ctx.fillStyle = '#5F6C7A'; ctx.font = '9px "Inter"';
      const timeLabels = ['开始', '30m', '1h', '2h', '3h', '4h', '5h', '6h', '收尾'];
      timeLabels.forEach((l, i) => { const x = padL + (cW / (timeLabels.length - 1)) * i; ctx.fillText(l, x, H - 10); });
    }

    // ========== 礼物排行榜渲染 ==========
    function renderGifts(data) {
      const rankEl = document.getElementById('giftRank'); rankEl.innerHTML = '';
      // 随机选5个不同的用户
      const users = [...userNames].sort(() => Math.random() - 0.5).slice(0, 5);
      // 为每个用户随机礼物和数量，礼物数量随排名递减趋势
      let ranks = users.map((u, i) => {
        const g = pick(gifts);
        const count = rand(8, 42 - i * 4);  // 礼物数量范围 8 ~ (42-4*排名)
        return { name: u, gift: g.name, count, totalCoin: g.coin * count, rank: i + 1 };
      }).sort((a, b) => b.totalCoin - a.totalCoin);
      const avatars = ['🦊', '🐱', '🌸', '🍀', '🐬', '🐼', '🦄'];
      ranks.forEach((r, i) => {
        const usdVal = (r.totalCoin / 1000).toFixed(2);
        const rankClass = r.rank === 1 ? 'r1' : r.rank === 2 ? 'r2' : r.rank === 3 ? 'r3' : 'rn';
        rankEl.innerHTML += `<div class="gift-item"><div class="gift-rank-num ${rankClass}">${r.rank}</div><div class="gift-avatar">${pick(avatars)}</div><div class="gift-info"><div class="name">${r.name}</div><div class="gift-name">× ${r.gift} ×${r.count}</div></div><div class="gift-amount"><div class="coins">${formatNum(r.totalCoin)}🪙</div><div class="usd">≈ $${usdVal}</div></div></div>`;
      });
    }

    // ========== 弹幕热词云渲染 ==========
    function renderTags() {
      const cloud = document.getElementById('tagsCloud'); cloud.innerHTML = '';
      // 随机取 12 个热词（不重复）
      const shuffled = [...tags].sort(() => Math.random() - 0.5).slice(0, 12);
      shuffled.forEach(t => {
        const hot = Math.random() > 0.7; // 约30%概率标记为“热门”样式
        cloud.innerHTML += `<div class="tag ${hot ? 'hot' : ''}">${t}</div>`;
      });
    }

    // ========== 数字滚动动画 ==========
    function animateValue(el, start, end, duration, isDecimal) {
      const startTime = performance.now();
      function update(now) {
        let progress = Math.min((now - startTime) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = start + (end - start) * eased;
        el.textContent = isDecimal ? current.toFixed(2) : formatNum(Math.floor(current));
        if (progress < 1) requestAnimationFrame(update);
      }
      requestAnimationFrame(update);
    }
    function initCounters() {
      document.querySelectorAll('[data-target]').forEach((el, i) => {
        const target = parseFloat(el.dataset.target);
        const isDec = el.hasAttribute('data-decimal');
        setTimeout(() => animateValue(el, 0, target, 1500 + i * 80, isDec), 200);
      });
    }

    // ========== 进度条动画 ==========
    function initProgressBar() { setTimeout(() => { document.getElementById('exchangeFill').style.width = `${rand(38, 88)}%`; }, 600); }

    // ========== 五彩纸屑特效 ==========
    function launchConfetti() {
      const container = document.getElementById('confettiContainer');
      for (let i = 0; i < 45; i++) {
        setTimeout(() => {
          const c = document.createElement('div');
          c.className = 'confetti';
          c.style.cssText = `position:absolute;left:${rand(5, 95)}%;background:${pick(['#6C5CE7', '#FF6B81', '#F9A825', '#00B894', '#0984E3'])};width:${rand(5, 10)}px;height:${rand(5, 10)}px;top:-12px;border-radius:${Math.random() > 0.5 ? '50%' : '2px'};animation:confettiFall ${rand(2, 4)}s linear forwards;`;
          container.appendChild(c);
          setTimeout(() => c.remove(), 6500);
        }, i * 40);
      }
    }

    // ========== UI 交互函数 ==========
    function openShare() { document.getElementById('shareModal').classList.add('active'); document.getElementById('overlay').classList.add('active'); }
    function closeShare() { document.getElementById('shareModal').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); }
    function shareAction(p) { closeShare(); showToast(`✨ 已生成${p}分享卡片`); }
    function handleWithdraw() { const btn = document.querySelector('.withdraw-btn'); btn.textContent = '⏳ 审核中...'; setTimeout(() => { btn.textContent = '✅ 提现成功！'; btn.style.background = 'linear-gradient(105deg, #00B894, #00A37A)'; setTimeout(() => { btn.textContent = '💳 立即提现到钱包'; btn.style.background = ''; }, 1800); }, 1200); }
    function startNewStream() { window.location.reload(); }
    function showToast(msg) { const t = document.createElement('div'); t.style.cssText = `position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:white;padding:10px 20px;border-radius:60px;z-index:200;font-size:13px;backdrop-filter:blur(12px);`; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }
    function updateLocalTime() {
      const now = new Date();
      const formatted = `${now.getFullYear()}.${pad(now.getMonth() + 1)}.${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
      document.getElementById('liveLocalTime').innerHTML = `📅 ${formatted}`;
    }

    // ========== 页面启动 ==========
    window.addEventListener('DOMContentLoaded', () => {
      setRandomAvatar();      // 随机设置头像 (1.jpg ~ 13.jpg)
      updateLocalTime();      // 显示当前本地时间
      const data = generateSessionData();  // 生成所有随机数据
      applyDataToDOM(data);   // 填充页面
      drawRandomChart(data);  // 绘制趋势图
      renderGifts(data);      // 渲染礼物榜
      renderTags();           // 渲染弹幕热词
      initCounters();         // 启动数字滚动动画
      initProgressBar();      // 进度条动画
      launchConfetti();       // 撒花特效
    });
    window.addEventListener('resize', () => { const data = generateSessionData(); drawRandomChart(data); });
  </script>
</body>
